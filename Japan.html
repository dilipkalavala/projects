<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Japan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Japan</span>
        <input id="search-bar" type="text" placeholder="Search for a Region..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Regions and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Region to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const regionsData = [
            { name: "Hokkaido", capital: "Sapporo", coordinates: [43.0667, 141.3500] },
            { name: "Aomori", capital: "Aomori", coordinates: [40.8244, 140.7400] },
            { name: "Iwate", capital: "Morioka", coordinates: [39.7036, 141.1525] },
            { name: "Miyagi", capital: "Sendai", coordinates: [38.2682, 140.8694] },
            { name: "Akita", capital: "Akita", coordinates: [39.7194, 140.1025] },
            { name: "Yamagata", capital: "Yamagata", coordinates: [38.2500, 140.3333] },
            { name: "Fukushima", capital: "Fukushima", coordinates: [37.7500, 140.4700] },
            { name: "Ibaraki", capital: "Mito", coordinates: [36.3417, 140.4467] },
            { name: "Tochigi", capital: "Utsunomiya", coordinates: [36.5550, 139.8836] },
            { name: "Gunma", capital: "Maebashi", coordinates: [36.3910, 139.0609] },
            { name: "Saitama", capital: "Saitama", coordinates: [35.8617, 139.6448] },
            { name: "Chiba", capital: "Chiba", coordinates: [35.6073, 140.1063] },
            { name: "Tokyo", capital: "Tokyo", coordinates: [35.6762, 139.6503] },
            { name: "Kanagawa", capital: "Yokohama", coordinates: [35.4437, 139.6380] },
            { name: "Niigata", capital: "Niigata", coordinates: [37.9022, 139.0236] },
            { name: "Toyama", capital: "Toyama", coordinates: [36.6953, 137.2113] },
            { name: "Ishikawa", capital: "Kanazawa", coordinates: [36.5613, 136.6562] },
            { name: "Fukui", capital: "Fukui", coordinates: [36.0652, 136.2210] },
            { name: "Yamanashi", capital: "Kofu", coordinates: [35.6528, 138.5684] },
            { name: "Nagano", capital: "Nagano", coordinates: [36.6513, 138.1810] },
            { name: "Gifu", capital: "Gifu", coordinates: [35.3913, 136.7222] },
            { name: "Shizuoka", capital: "Shizuoka", coordinates: [34.9756, 138.3828] },
            { name: "Aichi", capital: "Nagoya", coordinates: [35.1802, 136.9066] },
            { name: "Mie", capital: "Tsu", coordinates: [34.7303, 136.5086] },
            { name: "Shiga", capital: "Otsu", coordinates: [35.0044, 135.8683] },
            { name: "Kyoto", capital: "Kyoto", coordinates: [35.0116, 135.7681] },
            { name: "Osaka", capital: "Osaka", coordinates: [34.6937, 135.5023] },
            { name: "Hyogo", capital: "Kobe", coordinates: [34.6901, 135.1955] },
            { name: "Nara", capital: "Nara", coordinates: [34.6851, 135.8050] },
            { name: "Wakayama", capital: "Wakayama", coordinates: [34.2260, 135.1675] },
            { name: "Tottori", capital: "Tottori", coordinates: [35.5014, 134.2354] },
            { name: "Shimane", capital: "Matsue", coordinates: [35.4723, 133.0505] },
            { name: "Okayama", capital: "Okayama", coordinates: [34.6618, 133.9350] },
            { name: "Hiroshima", capital: "Hiroshima", coordinates: [34.3955, 132.4553] },
            { name: "Yamaguchi", capital: "Yamaguchi", coordinates: [34.1857, 131.4714] },
            { name: "Tokushima", capital: "Tokushima", coordinates: [34.0653, 134.5545] },
            { name: "Kagawa", capital: "Takamatsu", coordinates: [34.3428, 134.0467] },
            { name: "Ehime", capital: "Matsuyama", coordinates: [33.8396, 132.7650] },
            { name: "Kochi", capital: "Kochi", coordinates: [33.5597, 133.5311] },
            { name: "Fukuoka", capital: "Fukuoka", coordinates: [33.5902, 130.4017] },
            { name: "Saga", capital: "Saga", coordinates: [33.2490, 130.3000] },
            { name: "Nagasaki", capital: "Nagasaki", coordinates: [32.7503, 129.8777] },
            { name: "Kumamoto", capital: "Kumamoto", coordinates: [32.7897, 130.7417] },
            { name: "Oita", capital: "Oita", coordinates: [33.2382, 131.6126] },
            { name: "Miyazaki", capital: "Miyazaki", coordinates: [31.9070, 131.4202] },
            { name: "Kagoshima", capital: "Kagoshima", coordinates: [31.5601, 130.5581] },
            { name: "Okinawa", capital: "Naha", coordinates: [26.2125, 127.6811] }
        ];
        let originalRegionList = [...regionsData];
        const map = L.map('map').setView([36.2048, 138.2529], 5); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(regionsData);
        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Region: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = region.coordinates[0];
            const lon = region.coordinates[1];
            map.setView([lat, lon], 10); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; 
            speakText(`${region.name} - Capital: ${region.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Region to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([36.2048, 138.2529], 5); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            regionsData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>

</body>
</html>
