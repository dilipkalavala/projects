<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Botswana</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Botswana</span>
        <input id="search-bar" type="text" placeholder="Search for a District..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Districts and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a District to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const districtsData = [
            { name: "Central", capital: "Serowe", coordinates: [-22.4807, 26.5243] },
            { name: "Chobe", capital: "Kasane", coordinates: [-17.8016, 25.1541] },
            { name: "Ghanzi", capital: "Ghanzi", coordinates: [-22.4678, 21.5411] },
            { name: "Kgalagadi", capital: "Kanye", coordinates: [-23.6847, 25.8467] },
            { name: "Kgatleng", capital: "Mochudi", coordinates: [-24.3650, 26.1682] },
            { name: "Kweneng", capital: "Mahalapye", coordinates: [-23.1539, 26.5447] },
            { name: "North East", capital: "Masunga", coordinates: [-20.0133, 27.0586] },
            { name: "North West", capital: "Maun", coordinates: [-19.9808, 23.4102] },
            { name: "South East", capital: "Gaborone", coordinates: [-24.6282, 25.9231] }
        ];
        let originalDistrictList = [...districtsData];
        const map = L.map('map').setView([-24.6282, 25.9231], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateDistrictList(districts) {
            regionList.innerHTML = '';
            districts.forEach(district => {
                const li = document.createElement('li');
                li.textContent = `${district.name} - Capital: ${district.capital}`;
                li.addEventListener('click', () => handleDistrictClick(district));
                regionList.appendChild(li);
            });
        }
        populateDistrictList(districtsData);
        function handleDistrictClick(district) {
            document.getElementById('region-name').textContent = `District: ${district.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${district.capital}`;
            const lat = district.coordinates[0];
            const lon = district.coordinates[1];
            map.setView([lat, lon], 10); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${district.name} - ${district.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block';
            speakText(`${district.name} - Capital: ${district.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a District to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([-24.6282, 25.9231], 7); 
            populateDistrictList(originalDistrictList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredDistricts = [];
            regionList.innerHTML = ''; 
            districtsData.forEach(district => {
                if (district.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${district.name} - Capital: ${district.capital}`;
                    li.addEventListener('click', () => handleDistrictClick(district));
                    regionList.appendChild(li);
                    filteredDistricts.push(district);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
