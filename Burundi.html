<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Burundi</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Burundi</span>
        <input id="search-bar" type="text" placeholder="Search for a Province..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Provinces and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Province to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const provincesData = [
            { name: "Bubanza", capital: "Bubanza", coordinates: [-3.0833, 29.4000] },
            { name: "Bujumbura Mairie", capital: "Bujumbura", coordinates: [-3.3822, 29.3644] },
            { name: "Bujumbura Rural", capital: "Isale", coordinates: [-3.3250, 29.4325] },
            { name: "Bururi", capital: "Bururi", coordinates: [-3.9488, 29.6244] },
            { name: "Cankuzo", capital: "Cankuzo", coordinates: [-3.2000, 30.5500] },
            { name: "Cibitoke", capital: "Cibitoke", coordinates: [-2.8869, 29.1244] },
            { name: "Gitega", capital: "Gitega", coordinates: [-3.4264, 29.9300] },
            { name: "Karuzi", capital: "Karuzi", coordinates: [-3.1039, 30.1644] },
            { name: "Kayanza", capital: "Kayanza", coordinates: [-2.9208, 29.6250] },
            { name: "Kirundo", capital: "Kirundo", coordinates: [-2.5844, 30.0967] },
            { name: "Makamba", capital: "Makamba", coordinates: [-4.1344, 29.8028] },
            { name: "Muramvya", capital: "Muramvya", coordinates: [-3.2606, 29.6094] },
            { name: "Muyinga", capital: "Muyinga", coordinates: [-2.8475, 30.3333] },
            { name: "Mwaro", capital: "Mwaro", coordinates: [-3.5167, 29.7000] },
            { name: "Ngozi", capital: "Ngozi", coordinates: [-2.9083, 29.8308] },
            { name: "Rumonge", capital: "Rumonge", coordinates: [-3.9736, 29.4400] },
            { name: "Rutana", capital: "Rutana", coordinates: [-3.9272, 30.0497] },
            { name: "Ruyigi", capital: "Ruyigi", coordinates: [-3.4750, 30.2483] }
        ];
        let originalRegionList = [...provincesData];
        const map = L.map('map').setView([-3.3822, 29.3644], 8); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(provincesData);
        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Province: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = region.coordinates[0];
            const lon = region.coordinates[1];
            map.setView([lat, lon], 10); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block';
            speakText(`${region.name} - Capital: ${region.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Province to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([-3.3822, 29.3644], 8); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            provincesData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
