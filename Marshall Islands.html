<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Marshall Islands</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Marshall Islands</span>
        <input id="search-bar" type="text" placeholder="Search for an Atoll..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Atolls and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select an Atoll to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const atollsData = [
            { name: "Majuro", capital: "Delap-Uliga-Djarrit", coordinates: [7.1164, 171.1853] },
            { name: "Kwajalein", capital: "Ebeye", coordinates: [8.7166, 167.7361] },
            { name: "Ailinglaplap", capital: "Wotja", coordinates: [7.2666, 168.7275] },
            { name: "Arno", capital: "Ine", coordinates: [7.0833, 171.7333] },
            { name: "Bikini", capital: "Kili", coordinates: [11.6167, 165.3833] },
            { name: "Jaluit", capital: "Jabor", coordinates: [5.9167, 169.65] }
        ];
        let originalAtollsList = [...atollsData];
        const map = L.map('map').setView([7.1315, 171.1845], 6); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(atolls) {
            regionList.innerHTML = '';
            atolls.forEach(atoll => {
                const li = document.createElement('li');
                li.textContent = `${atoll.name} - Capital: ${atoll.capital}`;
                li.addEventListener('click', () => handleAtollClick(atoll));
                regionList.appendChild(li);
            });
        }
        populateRegionList(atollsData);
        function handleAtollClick(atoll) {
            document.getElementById('region-name').textContent = `Atoll: ${atoll.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${atoll.capital}`;
            const lat = atoll.coordinates[0];
            const lon = atoll.coordinates[1];
            map.setView([lat, lon], 9); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${atoll.name} - ${atoll.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; 
            speakText(`${atoll.name} - Capital: ${atoll.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select an Atoll to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([7.1315, 171.1845], 6); 
            populateRegionList(originalAtollsList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredAtolls = [];
            regionList.innerHTML = ''; 
            atollsData.forEach(atoll => {
                if (atoll.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${atoll.name} - Capital: ${atoll.capital}`;
                    li.addEventListener('click', () => handleAtollClick(atoll));
                    regionList.appendChild(li);
                    filteredAtolls.push(atoll);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
