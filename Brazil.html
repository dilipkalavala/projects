<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Brazil</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Brazil</span>
        <input id="search-bar" type="text" placeholder="Search for a State..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>States and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a State to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const statesData = [
            { name: "Acre", capital: "Rio Branco", coordinates: [-9.0238, -67.9068] },
            { name: "Alagoas", capital: "Maceió", coordinates: [-9.6658, -35.7353] },
            { name: "Amapá", capital: "Macapá", coordinates: [0.0393, -51.0707] },
            { name: "Amazonas", capital: "Manaus", coordinates: [-3.1190, -60.6120] },
            { name: "Bahia", capital: "Salvador", coordinates: [-12.9714, -38.5014] },
            { name: "Ceará", capital: "Fortaleza", coordinates: [-3.7172, -38.5433] },
            { name: "Distrito Federal", capital: "Brasília", coordinates: [-15.7801, -47.9292] },
            { name: "Espírito Santo", capital: "Vitória", coordinates: [-20.3155, -40.3128] },
            { name: "Goiás", capital: "Goiânia", coordinates: [-16.6864, -49.2648] },
            { name: "Maranhão", capital: "São Luís", coordinates: [-2.5297, -44.3028] },
            { name: "Mato Grosso", capital: "Cuiabá", coordinates: [-15.6010, -56.0972] },
            { name: "Mato Grosso do Sul", capital: "Campo Grande", coordinates: [-20.4427, -54.6464] },
            { name: "Minas Gerais", capital: "Belo Horizonte", coordinates: [-19.8190, -43.9386] },
            { name: "Pará", capital: "Belém", coordinates: [-1.4556, -48.4903] },
            { name: "Paraíba", capital: "João Pessoa", coordinates: [-7.1153, -34.8610] },
            { name: "Paraná", capital: "Curitiba", coordinates: [-25.4297, -49.2715] },
            { name: "Pernambuco", capital: "Recife", coordinates: [-8.0476, -34.8770] },
            { name: "Piauí", capital: "Teresina", coordinates: [-5.0919, -42.8047] },
            { name: "Rio de Janeiro", capital: "Rio de Janeiro", coordinates: [-22.9068, -43.1729] },
            { name: "Rio Grande do Norte", capital: "Natal", coordinates: [-5.7945, -35.2110] },
            { name: "Rio Grande do Sul", capital: "Porto Alegre", coordinates: [-30.0346, -51.2177] },
            { name: "Rondônia", capital: "Porto Velho", coordinates: [-8.7608, -63.9039] },
            { name: "Roraima", capital: "Boa Vista", coordinates: [2.8231, -60.6753] },
            { name: "Santa Catarina", capital: "Florianópolis", coordinates: [-27.5954, -48.5480] },
            { name: "São Paulo", capital: "São Paulo", coordinates: [-23.5505, -46.6333] },
            { name: "Sergipe", capital: "Aracaju", coordinates: [-10.9472, -37.0731] },
            { name: "Tocantins", capital: "Palmas", coordinates: [-10.1865, -48.3337] }
        ];
        let originalStateList = [...statesData];
        const map = L.map('map').setView([-15.7801, -47.9292], 5); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateStateList(states) {
            regionList.innerHTML = '';
            states.forEach(state => {
                const li = document.createElement('li');
                li.textContent = `${state.name} - Capital: ${state.capital}`;
                li.addEventListener('click', () => handleStateClick(state));
                regionList.appendChild(li);
            });
        }
        populateStateList(statesData);
        function handleStateClick(state) {
            document.getElementById('region-name').textContent = `State: ${state.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${state.capital}`;
            const lat = state.coordinates[0];
            const lon = state.coordinates[1];
            map.setView([lat, lon], 6); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${state.name} - ${state.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block';
            speakText(`${state.name} - Capital: ${state.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a State to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([-15.7801, -47.9292], 5); 
            populateStateList(originalStateList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredStates = [];
            regionList.innerHTML = ''; 
            statesData.forEach(state => {
                if (state.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${state.name} - Capital: ${state.capital}`;
                    li.addEventListener('click', () => handleStateClick(state));
                    regionList.appendChild(li);
                    filteredStates.push(state);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
