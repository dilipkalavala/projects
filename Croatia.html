<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Croatia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Croatia</span>
        <input id="search-bar" type="text" placeholder="Search for a County..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Counties and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a County to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const countiesData = [
            { name: "Bjelovar-Bilogora", capital: "Bjelovar", coordinates: [45.9022, 16.8458] },
            { name: "Brodsko-Posavska", capital: "Slavonski Brod", coordinates: [45.1667, 18.0000] },
            { name: "Dubrovnik-Neretva", capital: "Dubrovnik", coordinates: [42.6500, 18.0944] },
            { name: "Istria", capital: "Pula", coordinates: [44.8667, 13.8500] },
            { name: "Karlovac", capital: "Karlovac", coordinates: [45.4900, 15.5400] },
            { name: "Koprivnica-Križevci", capital: "Koprivnica", coordinates: [46.1500, 16.8500] },
            { name: "Krapina-Zagorje", capital: "Krapina", coordinates: [46.0000, 15.6000] },
            { name: "Lika-Senj", capital: "Senj", coordinates: [44.9800, 14.8833] },
            { name: "Medimurje", capital: "Čakovec", coordinates: [46.3167, 16.4333] },
            { name: "Osijek-Baranja", capital: "Osijek", coordinates: [45.5500, 18.7100] },
            { name: "Pozega-Slavonia", capital: "Požega", coordinates: [45.3000, 17.6667] },
            { name: "Primorje-Gorski Kotar", capital: "Rijeka", coordinates: [45.3300, 14.4400] },
            { name: "Sisak-Moslavina", capital: "Sisak", coordinates: [45.6167, 16.4000] },
            { name: "Split-Dalmatia", capital: "Split", coordinates: [43.5083, 16.4444] },
            { name: "Sibenik-Knin", capital: "Šibenik", coordinates: [43.7333, 15.9000] },
            { name: "Varaždin", capital: "Varaždin", coordinates: [46.3000, 16.3333] },
            { name: "Virovitica-Podravina", capital: "Virovitica", coordinates: [45.8200, 17.3800] },
            { name: "Vukovar-Srijem", capital: "Vukovar", coordinates: [45.3500, 18.9500] },
            { name: "Zadar", capital: "Zadar", coordinates: [44.1000, 15.2200] },
            { name: "Zagreb", capital: "Zagreb", coordinates: [45.8131, 15.9780] }
        ];
        let originalRegionList = [...countiesData];
        const map = L.map('map').setView([45.8131, 15.9780], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(counties) {
            regionList.innerHTML = '';
            counties.forEach(county => {
                const li = document.createElement('li');
                li.textContent = `${county.name} - Capital: ${county.capital}`;
                li.addEventListener('click', () => handleRegionClick(county));
                regionList.appendChild(li);
            });
        }
        populateRegionList(countiesData);
        function handleRegionClick(county) {
            document.getElementById('region-name').textContent = `County: ${county.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${county.capital}`;
            const lat = county.coordinates[0];
            const lon = county.coordinates[1];
            map.setView([lat, lon], 8); // Zoom into county location
            L.marker([lat, lon]).addTo(map).bindPopup(`${county.name} - ${county.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; // Show back button
            speakText(`${county.name} - Capital: ${county.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a County to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([45.8131, 15.9780], 7); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredCounties = [];
            regionList.innerHTML = ''; 
            countiesData.forEach(county => {
                if (county.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${county.name} - Capital: ${county.capital}`;
                    li.addEventListener('click', () => handleRegionClick(county));
                    regionList.appendChild(li);
                    filteredCounties.push(county);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>

</body>
</html>
