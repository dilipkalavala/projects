<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Bosnia and Herzegovina</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Bosnia and Herzegovina</span>
        <input id="search-bar" type="text" placeholder="Search for a Canton..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Cantons and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Canton to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const cantonsData = [
            { name: "Una-Sana", capital: "Bihać", coordinates: [44.8183, 15.8683] },
            { name: "Posavina", capital: "Orašje", coordinates: [44.8536, 18.6728] },
            { name: "Tuzla", capital: "Tuzla", coordinates: [44.0181, 18.6763] },
            { name: "Zenica-Doboj", capital: "Zenica", coordinates: [44.2000, 17.9000] },
            { name: "Bosnian Podrinje", capital: "Goražde", coordinates: [43.6800, 18.9678] },
            { name: "Sarajevo", capital: "Sarajevo", coordinates: [43.8486, 18.3564] },
            { name: "Herzegovina-Neretva", capital: "Mostar", coordinates: [43.3442, 17.8118] },
            { name: "Central Bosnia", capital: "Travnik", coordinates: [44.2311, 17.6619] },
            { name: "West Herzegovina", capital: "Široki Brijeg", coordinates: [43.3742, 17.6186] },
            { name: "Sarajevo-Romanija", capital: "Pale", coordinates: [43.8606, 18.9447] }
        ];
        let originalCantonList = [...cantonsData];
        const map = L.map('map').setView([43.8486, 18.3564], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateCantonList(cantons) {
            regionList.innerHTML = '';
            cantons.forEach(canton => {
                const li = document.createElement('li');
                li.textContent = `${canton.name} - Capital: ${canton.capital}`;
                li.addEventListener('click', () => handleCantonClick(canton));
                regionList.appendChild(li);
            });
        }
        populateCantonList(cantonsData);
        function handleCantonClick(canton) {
            document.getElementById('region-name').textContent = `Canton: ${canton.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${canton.capital}`;
            const lat = canton.coordinates[0];
            const lon = canton.coordinates[1];
            map.setView([lat, lon], 10); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${canton.name} - ${canton.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block';
            speakText(`${canton.name} - Capital: ${canton.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Canton to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([43.8486, 18.3564], 7); 
            populateCantonList(originalCantonList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredCantons = [];
            regionList.innerHTML = ''; 
            cantonsData.forEach(canton => {
                if (canton.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${canton.name} - Capital: ${canton.capital}`;
                    li.addEventListener('click', () => handleCantonClick(canton));
                    regionList.appendChild(li);
                    filteredCantons.push(canton);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
