<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of South Korea</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">South Korea</span>
        <input id="search-bar" type="text" placeholder="Search for a Region..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Regions and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Region to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const regionsData = [
            { name: "Seoul", capital: "Seoul", coordinates: [37.5665, 126.9780] },
            { name: "Busan", capital: "Busan", coordinates: [35.1796, 129.0756] },
            { name: "Incheon", capital: "Incheon", coordinates: [37.4563, 126.7052] },
            { name: "Daegu", capital: "Daegu", coordinates: [35.8714, 128.6014] },
            { name: "Daejeon", capital: "Daejeon", coordinates: [36.3504, 127.3845] },
            { name: "Gwangju", capital: "Gwangju", coordinates: [35.1595, 126.8526] },
            { name: "Ulsan", capital: "Ulsan", coordinates: [35.5384, 129.3114] },
            { name: "Gyeonggi", capital: "Suwon", coordinates: [37.2636, 127.0286] },
            { name: "Gangwon", capital: "Chuncheon", coordinates: [37.8837, 127.7316] },
            { name: "North Chungcheong", capital: "Cheongju", coordinates: [36.6354, 127.4895] },
            { name: "South Chungcheong", capital: "Hongseong", coordinates: [36.7991, 126.9183] },
            { name: "North Jeolla", capital: "Jeonju", coordinates: [35.8245, 127.1480] },
            { name: "South Jeolla", capital: "Mokpo", coordinates: [34.8141, 126.3926] },
            { name: "North Gyeongsang", capital: "Andong", coordinates: [36.5721, 128.7224] },
            { name: "South Gyeongsang", capital: "Changwon", coordinates: [35.2264, 128.6816] },
            { name: "Jeju", capital: "Jeju City", coordinates: [33.4996, 126.5312] }
        ];
        let originalRegionList = [...regionsData];
        const map = L.map('map').setView([37.5665, 126.9780], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(regionsData);
        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Region: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = region.coordinates[0];
            const lon = region.coordinates[1];
            map.setView([lat, lon], 10); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; 
            speakText(`${region.name} - Capital: ${region.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Region to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([37.5665, 126.9780], 7); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            regionsData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>

</body>
</html>
