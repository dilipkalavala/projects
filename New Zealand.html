<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of New Zealand</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">New Zealand</span>
        <input id="search-bar" type="text" placeholder="Search for a Region..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Regions and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Region to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const regionsData = [
            { name: "Auckland", capital: "Auckland City" },
            { name: "Bay of Plenty", capital: "Whakatāne" },
            { name: "Canterbury", capital: "Christchurch" },
            { name: "Chatham Islands", capital: "Waitangi" },
            { name: "Gisborne", capital: "Gisborne" },
            { name: "Hawke's Bay", capital: "Napier-Hastings" },
            { name: "Manawatu-Wanganui", capital: "Palmerston North" },
            { name: "Marlborough", capital: "Blenheim" },
            { name: "Nelson", capital: "Nelson" },
            { name: "Northland", capital: "Whangarei" },
            { name: "Otago", capital: "Dunedin" },
            { name: "Southland", capital: "Invercargill" },
            { name: "Taranaki", capital: "New Plymouth" },
            { name: "Tasman", capital: "Richmond" },
            { name: "Wellington", capital: "Wellington" },
            { name: "West Coast", capital: "Greymouth" },
            { name: "Waikato", capital: "Hamilton" },
            { name: "Wairarapa", capital: "Masterton" }
        ];
        let originalRegionList = [...regionsData];
        const map = L.map('map').setView([-40.9006, 174.8865], 6); // Coordinates for New Zealand
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);

        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(regionsData);

        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Region: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = -40.9006;  // Assuming central location for simplicity
            const lon = 174.8865;  // Coordinates for New Zealand's general area
            map.setView([lat, lon], 7); // Zoom into region
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; // Show back button
            speakText(`${region.name} - Capital: ${region.capital}`);
        }

        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }

        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Region to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([-40.9006, 174.8865], 6); 
            populateRegionList(originalRegionList); 
        });

        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            regionsData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });

        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });

        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
