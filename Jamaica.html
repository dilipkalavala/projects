<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Jamaica</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Jamaica</span>
        <input id="search-bar" type="text" placeholder="Search for a Parish..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Parishes and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Parish to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const regionsData = [
            { name: "Kingston", capital: "Kingston", coordinates: [17.9714, -76.7936] },
            { name: "Saint Andrew", capital: "Half Way Tree", coordinates: [17.9931, -76.8036] },
            { name: "Saint Ann", capital: "Saint Ann's Bay", coordinates: [18.4167, -77.1000] },
            { name: "Saint Catherine", capital: "Spanish Town", coordinates: [17.9861, -76.9531] },
            { name: "Saint Elizabeth", capital: "Black River", coordinates: [17.9167, -77.8333] },
            { name: "Saint James", capital: "Montego Bay", coordinates: [18.4650, -77.9179] },
            { name: "Saint Mary", capital: "Port Maria", coordinates: [18.0641, -76.8773] },
            { name: "Saint Thomas", capital: "Morant Bay", coordinates: [17.9314, -76.5156] },
            { name: "Trelawny", capital: "Falmouth", coordinates: [18.4600, -77.6667] },
            { name: "Westmoreland", capital: "Savanna-la-Mar", coordinates: [18.2075, -78.1128] },
            { name: "Clarendon", capital: "May Pen", coordinates: [17.9686, -77.2714] },
            { name: "Hanover", capital: "Lucea", coordinates: [18.4767, -78.1797] },
            { name: "Manchester", capital: "Mandeville", coordinates: [18.0394, -77.4972] },
            { name: "Portland", capital: "Port Antonio", coordinates: [18.1819, -76.4453] }
        ];
        let originalRegionList = [...regionsData];
        const map = L.map('map').setView([17.9714, -76.7936], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(regionsData);
        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Parish: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = region.coordinates[0];
            const lon = region.coordinates[1];
            map.setView([lat, lon], 10); // Zoom into region location
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; // Show back button
            speakText(`${region.name} - Capital: ${region.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Parish to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([17.9714, -76.7936], 7); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            regionsData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>

</body>
</html>
