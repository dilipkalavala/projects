<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Cuba</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Cuba</span>
        <input id="search-bar" type="text" placeholder="Search for a Province..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Provinces and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a Province to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const provincesData = [
            { name: "Pinar del Río", capital: "Pinar del Río", coordinates: [22.4181, -83.6988] },
            { name: "Havana", capital: "Havana", coordinates: [23.1136, -82.3666] },
            { name: "Matanzas", capital: "Matanzas", coordinates: [23.0500, -81.6000] },
            { name: "Cienfuegos", capital: "Cienfuegos", coordinates: [22.1500, -80.4500] },
            { name: "Villa Clara", capital: "Santa Clara", coordinates: [22.4247, -79.9833] },
            { name: "Sancti Spíritus", capital: "Sancti Spíritus", coordinates: [21.9333, -79.4500] },
            { name: "Ciego de Ávila", capital: "Ciego de Ávila", coordinates: [21.8267, -78.7675] },
            { name: "Camagüey", capital: "Camagüey", coordinates: [21.3800, -77.9167] },
            { name: "Las Tunas", capital: "Las Tunas", coordinates: [20.9611, -76.9561] },
            { name: "Granma", capital: "Bayamo", coordinates: [20.3750, -76.6306] },
            { name: "Holguín", capital: "Holguín", coordinates: [20.8833, -76.2600] },
            { name: "Santiago de Cuba", capital: "Santiago de Cuba", coordinates: [20.0228, -75.8219] },
            { name: "Guantánamo", capital: "Guantánamo", coordinates: [20.1450, -75.2100] },
            { name: "Ciego de Ávila", capital: "Ciego de Ávila", coordinates: [21.8267, -78.7675] },
            { name: "Isla de la Juventud", capital: "Nueva Gerona", coordinates: [21.8667, -82.8000] }
        ];
        let originalRegionList = [...provincesData];
        const map = L.map('map').setView([23.1136, -82.3666], 7); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(provinces) {
            regionList.innerHTML = '';
            provinces.forEach(province => {
                const li = document.createElement('li');
                li.textContent = `${province.name} - Capital: ${province.capital}`;
                li.addEventListener('click', () => handleRegionClick(province));
                regionList.appendChild(li);
            });
        }
        populateRegionList(provincesData);
        function handleRegionClick(province) {
            document.getElementById('region-name').textContent = `Province: ${province.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${province.capital}`;
            const lat = province.coordinates[0];
            const lon = province.coordinates[1];
            map.setView([lat, lon], 8); // Zoom into province location
            L.marker([lat, lon]).addTo(map).bindPopup(`${province.name} - ${province.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; // Show back button
            speakText(`${province.name} - Capital: ${province.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a Province to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([23.1136, -82.3666], 7); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredProvinces = [];
            regionList.innerHTML = ''; 
            provincesData.forEach(province => {
                if (province.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${province.name} - Capital: ${province.capital}`;
                    li.addEventListener('click', () => handleRegionClick(province));
                    regionList.appendChild(li);
                    filteredProvinces.push(province);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>

</body>
</html>
