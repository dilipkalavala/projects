<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive AI Map of Mongolia</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #search-container {
            padding: 10px;
            background-color: #f8f8f8;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #country-name {
            font-size: 18px;
            margin-right: 10px;
        }
        #search-bar {
            width: 80%;
            max-width: 400px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        #main-container {
            display: flex;
            height: calc(100vh - 60px);
        }
        #map {
            width: 50%;
            height: 100%;
        }
        #details-container {
            width: 50%;
            padding: 20px;
            background-color: #f8f8f8;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            text-align: left;
            font-size: 16px;
            overflow: auto;
        }
        #region-list {
            list-style-type: none;
            padding: 0;
        }
        #region-list li {
            padding: 8px;
            cursor: pointer;
            border: 1px solid #ddd;
            margin-bottom: 5px;
            border-radius: 4px;
        }
        #region-list li:hover {
            background-color: #f0f0f0;
        }
        #back-button {
            margin-top: 20px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #back-button:hover {
            background-color: #45a049;
        }
        #home-button, #world-map-button {
            position: absolute;
            top: 10px;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        #home-button:hover, #world-map-button:hover {
            background-color: #45a049;
        }
        #home-button {
            right: 10px;
        }
        #world-map-button {
            right: 90px;
        }
    </style>
</head>
<body>
    <button id="home-button">Home</button>
    <button id="world-map-button">World Map</button>
    <div id="search-container">
        <span id="country-name">Mongolia</span>
        <input id="search-bar" type="text" placeholder="Search for a province..." />
    </div>
    <div id="main-container">
        <div id="map"></div>
        <div id="details-container">
            <h3>Provinces and Capitals</h3>
            <ul id="region-list"></ul>
            <div id="region-name">Select a province to view details</div>
            <div id="capital-name"></div>
            <button id="back-button" style="display:none;">Back</button>
        </div>
    </div>
    <script>
        const regionsData = [
            { name: "Arkhangai", capital: "Tsetserleg", coordinates: [47.4864, 99.8006] },
            { name: "Bayankhongor", capital: "Bayankhongor", coordinates: [46.0966, 100.1667] },
            { name: "Bayan-Ölgii", capital: "Ölgii", coordinates: [48.0433, 89.9658] },
            { name: "Darkhan-Uul", capital: "Darkhan", coordinates: [49.4870, 105.9050] },
            { name: "Dornod", capital: "Choibalsan", coordinates: [48.0784, 114.5369] },
            { name: "Dornogovi", capital: "Sainshand", coordinates: [44.4997, 112.5125] },
            { name: "Govi-Altai", capital: "Altai", coordinates: [46.3961, 95.8833] },
            { name: "Govisümber", capital: "Sumber", coordinates: [45.4092, 108.0250] },
            { name: "Khentii", capital: "Undurkhaan", coordinates: [47.3641, 113.2525] },
            { name: "Khövsgöl", capital: "Mörön", coordinates: [50.1567, 100.1647] },
            { name: "Ömnögovi", capital: "Dalanzadgad", coordinates: [43.5393, 104.4194] },
            { name: "Orkhon", capital: "Erdenet", coordinates: [49.0700, 104.0800] },
            { name: "Selenge", capital: "Sükhbaatar", coordinates: [49.4583, 106.2956] },
            { name: "Töv", capital: "Zuunmod", coordinates: [47.7067, 106.9206] },
            { name: "Uvs", capital: "Ulaangom", coordinates: [48.0142, 92.0358] },
            { name: "Zavkhan", capital: "Uliastai", coordinates: [48.0194, 95.8489] }
        ];
        let originalRegionList = [...regionsData];
        const map = L.map('map').setView([47.8864, 106.9057], 6); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 18
        }).addTo(map);
        const regionList = document.getElementById('region-list');
        function populateRegionList(regions) {
            regionList.innerHTML = '';
            regions.forEach(region => {
                const li = document.createElement('li');
                li.textContent = `${region.name} - Capital: ${region.capital}`;
                li.addEventListener('click', () => handleRegionClick(region));
                regionList.appendChild(li);
            });
        }
        populateRegionList(regionsData);
        function handleRegionClick(region) {
            document.getElementById('region-name').textContent = `Province: ${region.name}`;
            document.getElementById('capital-name').textContent = `Capital: ${region.capital}`;
            const lat = region.coordinates[0];
            const lon = region.coordinates[1];
            map.setView([lat, lon], 8); 
            L.marker([lat, lon]).addTo(map).bindPopup(`${region.name} - ${region.capital}`).openPopup();
            document.getElementById('back-button').style.display = 'block'; 
            speakText(`${region.name} - Capital: ${region.capital}`);
        }
        function speakText(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            speechSynthesis.speak(utterance);
        }
        document.getElementById('back-button').addEventListener('click', function() {
            this.style.display = 'none'; 
            document.getElementById('region-name').textContent = 'Select a province to view details'; 
            document.getElementById('capital-name').textContent = ''; 
            map.setView([47.8864, 106.9057], 6); 
            populateRegionList(originalRegionList); 
        });
        document.getElementById('search-bar').addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();
            const filteredRegions = [];
            regionList.innerHTML = ''; 
            regionsData.forEach(region => {
                if (region.name.toLowerCase().includes(searchTerm)) {
                    const li = document.createElement('li');
                    li.textContent = `${region.name} - Capital: ${region.capital}`;
                    li.addEventListener('click', () => handleRegionClick(region));
                    regionList.appendChild(li);
                    filteredRegions.push(region);
                }
            });
        });
        document.getElementById('home-button').addEventListener('click', function() {
            window.location.href = 'Home.html';
        });
        document.getElementById('world-map-button').addEventListener('click', function() {
            window.location.href = 'World.html';
        });
    </script>
</body>
</html>
